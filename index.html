<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cultural Psychology — Theme 5 Visual Study Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f3f1ea; --panel:#fbfaf6; --panel2:#eeebe2; --line:#dcd7c9;
  --ink:#2c2c30; --mut:#7a7666;
  --navy:#37425b; --slate:#5f7185; --slate-soft:#8b96a6;
  --gold:#a98a55; --gold-soft:#c4ad7e;
  --soft:#ecefe9; --soft2:#eceef2;
  --green:#5d7d57; --green-bg:#e9efe4; --red:#a85a4b; --red-bg:#f1e7e2;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#d2ccbd;border-radius:8px}
::-webkit-scrollbar-track{background:transparent}
.app{display:flex;height:100vh}
.sidebar{width:238px;flex:0 0 238px;background:linear-gradient(180deg,#eef0ea,#eae7de);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:24px 16px}
.brand{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:25px;line-height:1.06;color:var(--navy)}
.brand small{display:block;font-family:'DM Sans';font-weight:500;font-size:10.5px;letter-spacing:2px;color:var(--mut);margin-top:7px;text-transform:uppercase}
.nav{margin-top:30px;display:flex;flex-direction:column;gap:6px}
.nav button{display:flex;align-items:center;gap:12px;width:100%;background:transparent;border:none;color:var(--mut);font-family:'DM Sans';font-size:15px;font-weight:500;padding:12px 14px;border-radius:9px;cursor:pointer;text-align:left;border-left:3px solid transparent;transition:.18s}
.nav button .ic{font-size:16px;width:18px;text-align:center}
.nav button:hover{background:#e6e3d8;color:var(--ink)}
.nav button.active{background:#e4e6df;color:var(--navy);border-left:3px solid var(--slate)}
.side-foot{margin-top:auto;font-size:11.5px;color:#928d7c;line-height:1.6;border-top:1px solid var(--line);padding-top:14px}
.side-foot b{color:var(--gold)}
.main{flex:1;overflow-y:auto;position:relative}
.view{display:none;padding:34px 42px 70px;max-width:1180px;margin:0 auto;animation:fade .35s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.eyebrow{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600}
h1.title{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:700;color:var(--navy);line-height:1.05;margin:6px 0 4px}
.lead{color:var(--mut);font-size:15.5px;max-width:780px;line-height:1.6;margin-top:8px}
.rule{height:1px;background:linear-gradient(90deg,var(--slate-soft),transparent);margin:22px 0 26px;border:none}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.ocard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:17px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.ocard:hover{border-color:var(--slate);transform:translateY(-3px);box-shadow:0 12px 28px -16px rgba(55,66,91,.5)}
.ocard .nimg{height:96px;border-radius:9px;background:#f4f5f1;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;margin-bottom:13px;overflow:hidden}
.ocard .nimg svg{width:100%;height:100%}
.ocard .nnum{font-family:'Cormorant Garamond';font-size:13px;color:var(--gold);font-weight:600;letter-spacing:.5px}
.ocard h3{font-family:'Cormorant Garamond';font-size:20px;font-weight:600;color:var(--navy);line-height:1.13;margin:3px 0 6px}
.ocard p{font-size:12.5px;color:var(--mut);line-height:1.5}
.ocard .chip{position:absolute;top:13px;right:13px;font-size:9.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--slate);background:#eceef1;border:1px solid var(--line);padding:3px 8px;border-radius:20px}
.sec-label{font-family:'Cormorant Garamond';font-size:23px;color:var(--navy);font-weight:600;margin:30px 0 14px;display:flex;align-items:center;gap:12px}
.sec-label::after{content:"";flex:1;height:1px;background:var(--line)}
.lesson-top{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:8px}
.lesson-counter{font-size:13px;color:var(--gold);font-weight:600;letter-spacing:.5px}
.navbtns{display:flex;gap:10px}
.navbtns button{background:var(--panel);border:1px solid var(--line);color:var(--ink);font-family:'DM Sans';font-size:13.5px;font-weight:600;padding:9px 16px;border-radius:9px;cursor:pointer;transition:.16s}
.navbtns button:hover:not(:disabled){border-color:var(--slate);color:var(--slate)}
.navbtns button:disabled{opacity:.35;cursor:not-allowed}
.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 14px;margin-bottom:6px}
.chips .lchip{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--mut);font-size:12px;font-weight:600;padding:7px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:.15s}
.chips .lchip:hover{color:var(--ink)}
.chips .lchip.active{background:#e6e8e2;border-color:var(--slate);color:var(--navy)}
.stage{display:grid;grid-template-columns:62% 38%;gap:22px;align-items:stretch}
.diagram-wrap{background:linear-gradient(160deg,#eef1ec,#eef0f3);border:1px solid var(--line);border-radius:15px;padding:16px;display:flex;flex-direction:column}
.diagram-wrap .dtitle{font-family:'Cormorant Garamond';font-size:19px;color:var(--navy);font-weight:600;margin:2px 4px 8px;display:flex;align-items:center;gap:8px}
.diagram-wrap svg{width:100%;height:auto;flex:1}
.side{display:flex;flex-direction:column;gap:16px}
.bullets{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:20px}
.bullets h4{font-family:'Cormorant Garamond';font-size:19px;color:var(--navy);font-weight:600;margin-bottom:12px}
.bullets ul{list-style:none;display:flex;flex-direction:column;gap:12px}
.bullets li{display:flex;gap:11px;font-size:14px;line-height:1.5;color:#45433c}
.bullets li .dot{flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:#e7e9e3;border:1px solid var(--slate-soft);color:var(--slate);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.bullets li b{color:var(--navy)}
.hook{background:#f4efe4;border:1px solid var(--gold-soft);border-radius:13px;padding:17px 18px}
.hook .ht{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;display:flex;align-items:center;gap:7px}
.hook p{margin-top:9px;font-family:'Cormorant Garamond';font-size:18px;font-style:italic;line-height:1.4;color:var(--ink)}
.fc-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.fc-bar .filters{display:flex;gap:7px;flex-wrap:wrap}
.fc-bar .filters button{background:var(--panel);border:1px solid var(--line);color:var(--mut);font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:20px;cursor:pointer;transition:.15s}
.fc-bar .filters button.active{background:#e6e8e2;border-color:var(--slate);color:var(--navy)}
.fc-bar .tools{margin-left:auto;display:flex;gap:8px}
.fc-bar .tools button{background:var(--slate);border:none;color:#fff;font-size:13px;font-weight:600;padding:9px 16px;border-radius:9px;cursor:pointer}
.fc-bar .tools button.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
.fc-count{font-size:12.5px;color:var(--mut);margin-bottom:14px}
.fc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:16px}
.flip{perspective:1400px;height:190px;cursor:pointer}
.flip-in{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.flip.flipped .flip-in{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:13px;border:1px solid var(--line);padding:18px;display:flex;flex-direction:column;justify-content:center}
.face.front{background:var(--panel)}
.face.back{background:#f3f4f1;transform:rotateY(180deg);border-color:var(--slate-soft)}
.face .ftag{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:8px}
.face.front .q{font-family:'Cormorant Garamond';font-size:21px;font-weight:600;line-height:1.2;color:var(--navy)}
.face.back .a{font-size:13.5px;line-height:1.55;color:#403e37}
.face.back .a b{color:var(--navy)}
.face .hint{position:absolute;bottom:12px;right:16px;font-size:10.5px;color:#a39e8e}
.mcq-head{display:flex;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.score{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 16px;font-size:13.5px;font-weight:600;color:var(--ink)}
.score b{color:var(--slate);font-family:'Cormorant Garamond';font-size:18px}
.mcq-head .tools button{background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:13px;font-weight:600;padding:9px 15px;border-radius:9px;cursor:pointer}
.q-card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:22px;margin-bottom:18px}
.q-card .qh{display:flex;gap:12px;margin-bottom:15px}
.q-card .qn{flex:0 0 auto;font-family:'Cormorant Garamond';font-size:15px;font-weight:700;color:#fff;background:var(--slate);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.q-card .qt{font-size:16px;font-weight:600;line-height:1.4;color:var(--navy);padding-top:3px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;gap:12px;align-items:flex-start;background:#f6f6f1;border:1px solid var(--line);border-radius:10px;padding:12px 14px;cursor:pointer;font-size:14px;line-height:1.4;color:#45433c;transition:.14s}
.opt:hover{border-color:var(--slate-soft)}
.opt .ol{flex:0 0 auto;width:22px;height:22px;border-radius:6px;border:1px solid var(--slate-soft);color:var(--slate);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.opt.correct{background:var(--green-bg);border-color:var(--green);color:#2f4329}
.opt.correct .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.wrong{background:var(--red-bg);border-color:var(--red);color:#5a2a20}
.opt.wrong .ol{background:var(--red);border-color:var(--red);color:#fff}
.opt.locked{cursor:default}
.opt.locked:hover{border-color:var(--line)}
.explain{margin-top:13px;border-left:3px solid var(--slate-soft);background:#eef0f1;border-radius:0 9px 9px 0;padding:12px 15px;font-size:13.5px;line-height:1.55;color:#474539;display:none}
.explain.show{display:block;animation:fade .3s}
.explain b{color:var(--navy)}
.explain .verdict{font-weight:700}
.verdict.ok{color:var(--green)}.verdict.no{color:var(--red)}
@media(max-width:880px){.sidebar{display:none}.stage{grid-template-columns:1fr}.view{padding:24px 18px 60px}h1.title{font-size:34px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">Cultural Psychology<small>Theme 5 · Mental Health Across Cultures</small></div>
    <nav class="nav" id="nav">
      <button data-view="overview" class="active"><span class="ic">▦</span> Overview</button>
      <button data-view="lessons"><span class="ic">❧</span> Lessons</button>
      <button data-view="flashcards"><span class="ic">⚎</span> Flashcards</button>
      <button data-view="mcq"><span class="ic">✓</span> MCQ</button>
    </nav>
    <div class="side-foot">Built for <b>Sezen</b><br>Erasmus University Rotterdam<br>Heine Ch.14 · Helman · Jurado · Chu · Alegria</div>
  </aside>
  <main class="main">
    <section id="overview" class="view active"></section>
    <section id="lessons" class="view"></section>
    <section id="flashcards" class="view"></section>
    <section id="mcq" class="view"></section>
  </main>
</div>
<script>
const C={navy:'#37425b',slate:'#5f7185',slateSoft:'#9aa3b2',gold:'#a98a55',ink:'#2c2c30',mut:'#7a7666',
  line:'#cdc7b7',panel:'#ffffff',soft:'#eef1ec',soft2:'#eceef2',green:'#5d7d57',red:'#a85a4b'};
function svg(inner,vb){return '<svg viewBox="'+(vb||'0 0 840 470')+'" xmlns="http://www.w3.org/2000/svg" font-family="DM Sans, sans-serif">'+
  '<defs><marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="'+C.slate+'"/></marker>'+
  '<marker id="arrg" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="'+C.green+'"/></marker>'+
  '<marker id="arrr" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="'+C.red+'"/></marker>'+
  '<marker id="arrgo" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="'+C.gold+'"/></marker></defs>'+inner+'</svg>';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function T(x,y,s,o){o=o||{};return '<text x="'+x+'" y="'+y+'" fill="'+(o.fill||C.ink)+'" font-size="'+(o.size||15)+'" font-family="'+(o.font||'DM Sans, sans-serif')+'" text-anchor="'+(o.anchor||'start')+'"'+(o.weight?' font-weight="'+o.weight+'"':'')+(o.style?' font-style="'+o.style+'"':'')+(o.ls?' letter-spacing="'+o.ls+'"':'')+'>'+esc(s)+'</text>';}
function R(x,y,w,h,o){o=o||{};return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="'+(o.rx==null?11:o.rx)+'" fill="'+(o.fill||C.panel)+'" stroke="'+(o.stroke||C.slateSoft)+'" stroke-width="'+(o.sw||1.4)+'"'+(o.dash?' stroke-dasharray="'+o.dash+'"':'')+(o.op?' opacity="'+o.op+'"':'')+'/>';}
function LN(x1,y1,x2,y2,o){o=o||{};return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(o.stroke||C.slate)+'" stroke-width="'+(o.sw||1.5)+'"'+(o.dash?' stroke-dasharray="'+o.dash+'"':'')+(o.marker?' marker-end="url(#'+o.marker+')"':'')+'/>';}
function CIR(cx,cy,r,o){o=o||{};return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(o.fill||'none')+'" stroke="'+(o.stroke||C.slateSoft)+'" stroke-width="'+(o.sw||1.4)+'"'+(o.dash?' stroke-dasharray="'+o.dash+'"':'')+(o.op?' opacity="'+o.op+'"':'')+'/>';}
function PATH(d,o){o=o||{};return '<path d="'+d+'" fill="'+(o.fill||'none')+'" stroke="'+(o.stroke||C.slate)+'" stroke-width="'+(o.sw||1.5)+'"'+(o.dash?' stroke-dasharray="'+o.dash+'"':'')+(o.marker?' marker-end="url(#'+o.marker+')"':'')+(o.op?' opacity="'+o.op+'"':'')+'/>';}
function boxC(x,y,w,h,lines,o){o=o||{};var s=R(x,y,w,h,o);var n=lines.length;var lh=o.lh||17;var cy=y+h/2-(n-1)*lh/2+5;lines.forEach(function(ln){s+=T(x+w/2,cy,ln.t,{anchor:'middle',size:ln.size||14,fill:ln.fill||C.ink,weight:ln.weight,style:ln.style,font:ln.font});cy+=lh;});return s;}
function pill(x,y,w,h,txt,o){o=o||{};return R(x,y,w,h,{rx:h/2,fill:o.fill||'#eceef1',stroke:o.stroke||C.slateSoft,sw:o.sw})+T(x+w/2,y+h/2+5,txt,{anchor:'middle',size:o.size||13,fill:o.tfill||C.navy,weight:o.weight||600});}
const lessons=[];
function addLesson(o){lessons.push(o);}

/* L1 — Keisuke & the big question */
addLesson({num:1,topic:'Heine Ch.14',title:'Keisuke & the Big Question',
svg:(function(){var g='';
g+=T(420,40,'Does culture shape suffering?',{anchor:'middle',size:14,fill:C.navy,weight:600,font:'Cormorant Garamond, serif'});
g+=R(300,66,240,70,{stroke:C.navy,fill:'#eef0ea'});g+=T(420,98,'HIKIKOMORI',{anchor:'middle',size:15,fill:C.navy,weight:700});g+=T(420,118,'\u201Cpull inward\u201D \u2014 social withdrawal',{anchor:'middle',size:10.5,fill:C.mut});
g+=PATH('M420,136 L420,168',{marker:'arr'});
g+=R(250,170,340,52,{stroke:C.slate,fill:'#fff'});g+=T(420,192,'voluntary isolation \u2265 6 months,',{anchor:'middle',size:11.5,fill:C.ink});g+=T(420,210,'no school/job \u2022 ~1% of Japanese \u2022 mostly boys',{anchor:'middle',size:11,fill:C.mut});
g+=T(225,252,'Why mostly Japanese? 3 reasons',{anchor:'middle',size:12,fill:C.navy,weight:700});
g+=T(120,278,'1.  hypothesised causes less present elsewhere',{size:11.5,fill:C.ink});
g+=T(120,300,'2.  parents react differently (don\u2019t \u2018break the door\u2019)',{size:11.5,fill:C.ink});
g+=T(120,322,'3.  symptoms fit NO single DSM-5 category',{size:11.5,fill:C.ink});
g+=R(95,346,700,72,{stroke:C.gold,dash:'5 4',fill:'#f7f1e3'});
g+=T(120,372,'Sociocultural drivers (since 1980s):',{size:11.5,weight:700,fill:C.navy});
g+=T(120,394,'valuing work less \u2022 overprotective parenting \u2022 weaker interdependence \u2022 shrunken job market;',{size:11,fill:C.ink});
g+=T(120,412,'most common in eldest sons (pressure to carry the family name).',{size:11,fill:C.mut});
return svg(g);})(),
bullets:[
['1','<b>Keisuke</b> shut himself in the kitchen for years \u2014 a case of <b>hikikomori</b> (social withdrawal \u2265 6 months).'],
['2','It affects ~1% of Japanese, mostly adolescent boys (often after bullying).'],
['3','It appears largely <b>unique to Japan</b>: causes, parental reactions, and DSM-fit all differ.'],
['4','Its symptoms don\u2019t map onto a single DSM-5 diagnosis.'],
['5','The opening lesson: <b>culture helps shape psychopathology</b>, not just surface customs.']
],
hook:'A disorder this common in Japan yet almost unknown elsewhere is the chapter\u2019s proof that culture writes part of the script of mental illness.'});

/* L2 — defining disorder & cultural variability */
addLesson({num:2,topic:'Heine Ch.14',title:'Defining Disorder & Cultural Variability',
svg:(function(){var g='';
g+=T(420,38,'What counts as a \u201Cdisorder\u201D?',{anchor:'middle',size:14,fill:C.navy,weight:600,font:'Cormorant Garamond, serif'});
g+=boxC(150,62,250,56,[{t:'usual rule: RARE',size:12,fill:C.navy,weight:700},{t:'+ causes IMPAIRMENT',size:11,fill:C.ink}],{stroke:C.slate});
g+=boxC(450,62,250,56,[{t:'but exceptions abound',size:12,fill:C.navy,weight:700},{t:'(frat-party drinking; Glenn Gould)',size:10.5,fill:C.mut}],{stroke:C.line});
g+=R(95,140,700,86,{stroke:C.gold,dash:'5 4',fill:'#f7f1e3'});
g+=T(120,166,'Dhat syndrome (South Asia):',{size:12,weight:700,fill:C.navy});
g+=T(310,166,'young men\u2019s morbid anxiety about \u2018leaking\u2019 semen (a vital essence).',{size:11.5,fill:C.ink});
g+=T(120,190,'Without the shared cultural belief, dhat is meaningless to a Westerner \u2014 they wouldn\u2019t',{size:11.5,fill:C.ink});
g+=T(120,210,'experience it as a disorder at all. Meaning, not just biology, defines the condition.',{size:11.5,fill:C.mut});
g+=T(420,254,'The reverse warning',{anchor:'middle',size:12.5,fill:C.navy,weight:700});
g+=boxC(120,272,260,70,[{t:'Psychiatry built in the WEST',size:11.5,fill:C.ink},{t:'\u2192 its disorders (depression,',size:10.5,fill:C.mut},{t:'anxiety, schizophrenia) = the \u2018norm\u2019',size:10.5,fill:C.mut}],{stroke:C.slate});
g+=LN(382,307,440,307,{marker:'arrr'});
g+=boxC(442,272,260,70,[{t:'risk: judge local distress',size:11.5,fill:C.red,weight:700},{t:'by how well it fits',size:10.5,fill:C.ink},{t:'Western boxes',size:10.5,fill:C.ink}],{stroke:C.red});
g+=T(420,372,'Some Western categories may be universal; others are culturally specific. Normal varies, so abnormal varies.',{anchor:'middle',size:11,fill:C.gold,style:'italic'});
return svg(g);})(),
bullets:[
['1','Disorders are usually defined as behaviour that is <b>rare and impairing</b> \u2014 but with many exceptions.'],
['2','It gets harder when a behaviour is a problem in one culture but not another.'],
['3','<b>Dhat syndrome</b>: semen-loss anxiety that only \u201Cexists\u201D given the South Asian belief about semen as vitality.'],
['4','Because psychiatry is <b>Western</b>, its categories are wrongly treated as universal.'],
['5','<b>Cultural variability</b>: if normal functioning varies, so does the line into \u201Cdisorder.\u201D']
],
hook:'You can only \u2018catch\u2019 dhat if your culture believes semen is precious. The diagnosis needs the belief \u2014 so don\u2019t judge every culture\u2019s pain with a Western ruler.'});

/* L3 — culture-bound syndromes */
addLesson({num:3,topic:'Heine Ch.14',title:'Culture-Bound Syndromes',
svg:(function(){var g='';

const cards=[
{t:'Heine Ch.14',q:'Hikikomori',a:'A largely Japanese condition of <b>extreme social withdrawal</b> (\u2265 6 months, no school/job), most common in adolescent boys (~1% of Japanese).'},
{t:'Heine Ch.14',q:'Why is hikikomori \u201Cculture-bound\u201D?',a:'Its causes are less present elsewhere, parents react differently, and its symptoms fit <b>no single DSM-5 category</b>.'},
{t:'Heine Ch.14',q:'Defining a \u201Cdisorder\u201D',a:'Usually <b>rare + causes impairment</b> \u2014 but with many exceptions (frat-party drinking; Glenn Gould). The line is partly drawn by culture.'},
{t:'Heine Ch.14',q:'Dhat syndrome',a:'South Asian young men\u2019s morbid anxiety about <b>losing semen</b> (a vital essence). Meaningless without the shared cultural belief.'},
{t:'Heine Ch.14',q:'Culture-bound syndrome',a:'A symptom cluster shaped so strongly by <b>cultural meaning</b> that it occurs mainly (or only) in certain cultures (DSM-5: \u201Ccultural concept of distress\u201D).'},
{t:'Heine Ch.14',q:'Koro',a:'A culture-bound syndrome (South/East Asia): morbid <b>fear the genitals are shrinking</b> into the body; can occur in epidemics.'},
{t:'Heine Ch.14',q:'Ataques de nervios',a:'A Latino (esp. Puerto Rican) syndrome: convulsions, palpitations, outbursts after a <b>stressful family event</b> \u2014 a recognised way to express strong emotion.'},
{t:'Heine Ch.14',q:'Amok',a:'A Southeast Asian syndrome: a sudden <b>outburst of uncontrolled violence</b> after brooding, ending in exhaustion/amnesia (\u201Crunning amok\u201D).'},
{t:'Heine Ch.14',q:'Eating disorders & culture',a:'<b>Bulimia</b> = a clear culture-bound syndrome of modern Western-influenced cultures; <b>anorexia</b> is more mixed (possibly an existential universal).'},
{t:'Heine Ch.14',q:'Somatization vs psychologization',a:'Expressing distress mainly through <b>physical symptoms</b> (somatization, common in China) vs <b>psychological ones</b> (psychologization, common in the West).'},
{t:'Heine Ch.14',q:'Depression across cultures',a:'Universal (found in every culture studied) but far rarer in China; East Asians somatize, Westerners psychologize; depressed mood may not be core for Chinese.'},
{t:'Heine Ch.14',q:'Taijin kyoufushou (TKS)',a:'A Japanese social-anxiety variant: fear of <b>offending/embarrassing OTHERS</b> (the \u201Caltruistic phobia\u201D), unlike Western fear of embarrassing oneself.'},
{t:'Heine Ch.14',q:'Schizophrenia across cultures',a:'The most cross-culturally <b>similar</b> disorder (strong genetic basis), but subtypes vary (paranoid UK vs catatonic India) and the course is often <b>better</b> in less-industrial societies.'},
{t:'Heine Ch.14',q:'Suicide across cultures',a:'Suicidal tendencies are universal, but <b>rates & motives vary enormously</b> (Japan\u2019s honour-linked seppuku; First Nations identity loss; low rates in many Muslim cultures).'},
{t:'Heine Ch.14',q:'Treating mental illness cross-culturally',a:'Western \u201Ctalking therapy\u201D isn\u2019t culture-free; indigenous methods (Morita, Naikan, family/spiritual healing) abound; ethnic matching helps only modestly \u2014 <b>cultural competence</b> matters more.'},
{t:'Heine Ch.14',q:'Watters\u2019 \u201CCrazy Like Us\u201D / symptom pool',a:'Exporting Western diagnostic categories can <b>spread</b> conditions (anorexia in Hong Kong, PTSD in Sri Lanka); each culture offers a \u201Csymptom pool.\u201D'},
{t:'Helman 2007',q:'Benefits of migration',a:'Opportunity (education, healthcare), <b>remittances</b> (\u201Cmigrodollars\u201D), new ideas/freedom/autonomy, stronger family bonds, and safety for refugees.'},
{t:'Helman 2007',q:'Health risks of migration',a:'Loss of identity/community; disrupted networks; more physical disease (diabetes, HIV, TB); and higher <b>mental illness, addiction, suicide</b> and family breakdown.'},
{t:'Helman 2007',q:'Cultural bereavement',a:'A grief-like reaction to the <b>loss of homeland, people, customs and the \u2018assumptive world\u2019</b>; migration as a psychosocial transition.'},
{t:'Helman 2007',q:'Factors affecting migrant mental health',a:'Pre-migration (class, trauma, resilience), the stressful process (language), and post-migration acculturation (discrimination, unemployment, status loss).'},
{t:'Helman 2007',q:'Family role inversions',a:'<b>Generational</b> (kids interpret for parents), <b>gender-role</b> (women become breadwinners), and <b>space</b> (\u2018there\u2019 feels more real than \u2018here\u2019).'},
{t:'Helman 2007',q:'Refugee health',a:'Worse than other migrants: no preparation, family separation, trauma/PTSD, plus physical problems (malnutrition, TB); long-term cultural bereavement.'},
{t:'Helman 2007',q:'Selection vs stress hypothesis',a:'<b>Selection</b>: vulnerable people are more likely to migrate. <b>Stress</b>: migration itself precipitates illness. Usually <b>both</b> (plus resilience).'},
{t:'Helman 2007',q:'Variation in rates across migrant groups',a:'Lower risk with education, portable skills, resources, contacts and a coherent worldview; higher morbidity can persist <b>2\u20133 generations</b>.'},
{t:'Helman 2007',q:'Management of migrant mental health',a:'Culturally appropriate care; work with <b>traditional healers</b>; recognise \u2018mad vs bad\u2019 labelling skews stats; support migrants\u2019 own <b>self-help communities</b>.'},
{t:'Jurado 2017',q:'Common mental disorders (CMD)',a:'Depression, generalised anxiety, panic disorder, OCD, PTSD and social anxiety (NICE). Multicausal.'},

{t:'Jurado 2017',q:'Migration-morbidity hypothesis',a:'Migration is a <b>stressor</b> that raises mental-disorder risk \u2192 migrants fare worse than natives. Mainly European/Israeli/Chinese/Australian data.'},
{t:'Jurado 2017',q:'Are the two hypotheses exclusive?',a:'No \u2014 <b>both can be true</b> depending on context; you must consider the baseline CMD rate in the country of origin.'},
{t:'Jurado 2017',q:'Individual CMD factors',a:'Risk: female, very young/old, unmarried, low education/SES, region of origin, low self-esteem. Protective: optimism, sense of control, resilience.'},

{t:'Chu 2023',q:'Treatment engagement (REACH)',a:'A multidimensional connection to care: <b>R</b>elationship, <b>E</b>xpectancy, <b>A</b>ttendance, <b>C</b>larity, <b>H</b>omework.'},
{t:'Chu 2023',q:'Racial matching',a:'Pairing a client with a therapist of the <b>same race/ethnicity</b>; theorised to boost engagement via perceived similarity \u2014 but evidence is mixed.'},

{t:'Alegria 2020',q:'Three lessons for engaging minority clients',a:'(1) Overcome positional hierarchies (shared decision making); (2) center goals on the client; (3) share identities both ways.'},
{t:'Alegria 2020',q:'Shared decision making',a:'A collaborative dialogue \u2014 shared agenda, collaborative language, humility \u2014 that <b>rebalances power</b> between clinician and client.'},

/* ===================== APP LOGIC ===================== */
var state={lesson:0,filter:'All',cardOrder:cards.map(function(_,i){return i;}),score:0,answered:0};
document.querySelectorAll('#nav button').forEach(function(b){b.addEventListener('click',function(){show(b.dataset.view);});});
function show(v){
  document.querySelectorAll('#nav button').forEach(function(b){b.classList.toggle('active',b.dataset.view===v);});
  document.querySelectorAll('.view').forEach(function(s){s.classList.toggle('active',s.id===v);});
  document.querySelector('.main').scrollTop=0;
}
function renderOverview(){
  var groups=['Heine Ch.14','Helman 2007','Jurado 2017','Chu 2023','Alegria 2020'];
  var labels={'Heine Ch.14':'Heine Ch.14 \u2014 Mental Health Across Cultures','Helman 2007':'Helman (2007) \u2014 The Health Risks of Migration','Jurado 2017':'Jurado et al. (2017) \u2014 Common Mental Disorders in Migrants','Chu 2023':'Chu et al. (2023) \u2014 Racial Matching vs Cultural Understanding','Alegria 2020':'Alegria et al. (2020) \u2014 Engaging Ethnic Minorities'};
  var h='<div class="eyebrow">Theme 5 \u00B7 Mental Health Challenges Across Cultures</div>'+
    '<h1 class="title">Culture, Mind & Healing</h1>'+
    '<p class="lead">Fifteen whiteboard-style lessons across five readings \u2014 from culture-bound syndromes to migrant mental health and engaging minority clients. Click any card to open its diagram.</p><hr class="rule">';
  groups.forEach(function(gp){
    h+='<div class="sec-label">'+labels[gp]+'</div><div class="grid">';
    lessons.forEach(function(L,i){ if(L.topic!==gp) return;
      h+='<div class="ocard" data-i="'+i+'"><span class="chip">'+L.topic+'</span>'+
         '<div class="nimg">'+L.svg+'</div><div class="nnum">Lesson '+L.num+'</div>'+
         '<h3>'+L.title+'</h3><p>'+L.bullets[0][1].replace(/<[^>]+>/g,'')+'</p></div>';
    });
    h+='</div>';
  });
  document.getElementById('overview').innerHTML=h;
  document.querySelectorAll('.ocard').forEach(function(c){c.addEventListener('click',function(){state.lesson=+c.dataset.i;renderLesson();show('lessons');});});
}
function renderLesson(){
  var L=lessons[state.lesson];
  var chips='<div class="chips">'+lessons.map(function(x,i){return '<button class="lchip'+(i===state.lesson?' active':'')+'" data-i="'+i+'">'+x.num+'. '+x.title+'</button>';}).join('')+'</div>';
  var bl=L.bullets.map(function(b){return '<li><span class="dot">'+b[0]+'</span><span>'+b[1]+'</span></li>';}).join('');
  var h='<div class="eyebrow">'+L.topic+'</div>'+
    '<div class="lesson-top"><div><h1 class="title" style="font-size:33px">'+L.title+'</h1><div class="lesson-counter">Lesson '+L.num+' of '+lessons.length+'</div></div>'+
    '<div class="navbtns"><button id="prevL"'+(state.lesson===0?' disabled':'')+'>\u2190 Prev</button><button id="nextL"'+(state.lesson===lessons.length-1?' disabled':'')+'>Next \u2192</button></div></div>'+
    chips+
    '<div class="stage"><div class="diagram-wrap"><div class="dtitle">\u270E Whiteboard</div>'+L.svg+'</div>'+
    '<div class="side"><div class="bullets"><h4>Key points</h4><ul>'+bl+'</ul></div>'+
    '<div class="hook"><div class="ht">\u2726 Memory hook</div><p>'+L.hook+'</p></div></div></div>';
  document.getElementById('lessons').innerHTML=h;
  var p=document.getElementById('prevL'),n=document.getElementById('nextL');
  if(p)p.onclick=function(){if(state.lesson>0){state.lesson--;renderLesson();}};
  if(n)n.onclick=function(){if(state.lesson<lessons.length-1){state.lesson++;renderLesson();}};
  document.querySelectorAll('.lchip').forEach(function(c){c.addEventListener('click',function(){state.lesson=+c.dataset.i;renderLesson();});});
  var active=document.querySelector('.lchip.active'); if(active&&active.scrollIntoView)active.scrollIntoView({inline:'center',block:'nearest'});
}
function renderFlash(){
  var topics=['All','Heine Ch.14','Helman 2007','Jurado 2017','Chu 2023','Alegria 2020'];
  var shown=state.cardOrder.filter(function(i){return state.filter==='All'||cards[i].t===state.filter;});
  var h='<div class="eyebrow">Active recall</div><h1 class="title">Flashcards</h1>'+
    '<p class="lead">Click a card to flip. Filter by source, shuffle for a fresh order, or reset.</p><hr class="rule">'+
    '<div class="fc-bar"><div class="filters">'+topics.map(function(t){return '<button class="'+(state.filter===t?'active':'')+'" data-f="'+t+'">'+t+'</button>';}).join('')+
    '</div><div class="tools"><button id="shuf">\u21BB Shuffle</button><button id="reset" class="ghost">Reset</button></div></div>'+
    '<div class="fc-count">'+shown.length+' cards</div><div class="fc-grid">'+
    shown.map(function(i){var c=cards[i];return '<div class="flip" data-id="'+i+'"><div class="flip-in">'+
      '<div class="face front"><div class="ftag">'+c.t+'</div><div class="q">'+c.q+'</div><div class="hint">tap to flip</div></div>'+
      '<div class="face back"><div class="ftag">Answer</div><div class="a">'+c.a+'</div></div></div></div>';}).join('')+'</div>';
  document.getElementById('flashcards').innerHTML=h;
  document.querySelectorAll('.flip').forEach(function(f){f.addEventListener('click',function(){f.classList.toggle('flipped');});});
  document.querySelectorAll('.fc-bar .filters button').forEach(function(b){b.addEventListener('click',function(){state.filter=b.dataset.f;renderFlash();});});
  document.getElementById('shuf').onclick=function(){for(var a=state.cardOrder,k=a.length-1;k>0;k--){var j=Math.floor(Math.random()*(k+1));var tmp=a[k];a[k]=a[j];a[j]=tmp;}renderFlash();};
  document.getElementById('reset').onclick=function(){state.cardOrder=cards.map(function(_,i){return i;});state.filter='All';renderFlash();};
}
function renderMCQ(){
  var h='<div class="eyebrow">Exam practice</div><h1 class="title">Multiple-Choice Questions</h1>'+
    '<p class="lead">Pick an answer for instant feedback and an explanation. '+mcqs.length+' exam-style items.</p><hr class="rule">'+
    '<div class="mcq-head"><div class="score">Score <b id="sc">0</b> / '+mcqs.length+'</div><div class="tools"><button id="mreset">Reset quiz</button></div></div>';
  mcqs.forEach(function(m,qi){
    h+='<div class="q-card" data-q="'+qi+'"><div class="qh"><span class="qn">'+(qi+1)+'</span><span class="qt">'+m.q+'</span></div><div class="opts">';
    m.o.forEach(function(opt,oi){h+='<div class="opt" data-o="'+oi+'"><span class="ol">'+String.fromCharCode(65+oi)+'</span><span>'+opt+'</span></div>';});
    h+='</div><div class="explain"><span class="verdict"></span> <span class="etext">'+m.e+'</span></div></div>';
  });
  document.getElementById('mcq').innerHTML=h;
  state.score=0;state.answered=0;
  document.querySelectorAll('.q-card').forEach(function(card){
    var qi=+card.dataset.q,done=false;
    card.querySelectorAll('.opt').forEach(function(opt){
      opt.addEventListener('click',function(){
        if(done)return;done=true;
        var oi=+opt.dataset.o,correct=mcqs[qi].c;
        card.querySelectorAll('.opt').forEach(function(o){o.classList.add('locked');var k=+o.dataset.o;if(k===correct)o.classList.add('correct');});
        var ex=card.querySelector('.explain'),vd=card.querySelector('.verdict');
        if(oi===correct){state.score++;vd.textContent='Correct.';vd.className='verdict ok';}
        else{opt.classList.add('wrong');vd.textContent='Not quite.';vd.className='verdict no';}
        ex.classList.add('show');document.getElementById('sc').textContent=state.score;
      });
    });
  });
  document.getElementById('mreset').onclick=function(){renderMCQ();};
}
renderOverview();renderLesson();renderFlash();renderMCQ();
</script>
